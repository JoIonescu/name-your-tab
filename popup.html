<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #111;
      color: #f0f0f0;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }

    .header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .hostname {
      font-size: 11px;
      color: #555;
      margin-top: 1px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 6px;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input[type="text"] {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #555;
    }

    .colors {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }

    .color-swatch:hover {
      transform: scale(1.15);
    }

    .color-swatch.selected {
      border-color: #fff;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .btn-apply {
      background: #fff;
      color: #111;
    }

    .btn-reset {
      background: #1e1e1e;
      color: #777;
      border: 1px solid #2e2e2e;
      flex: 0 0 auto;
      padding: 8px 12px;
    }

    .status {
      font-size: 11px;
      color: #555;
      text-align: center;
      min-height: 14px;
    }

    .status.success { color: #6fcf97; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="header-dot"></div>
    <div>
      <h1>Tab Namer</h1>
      <div class="hostname" id="hostname">—</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Tab name</div>
    <input type="text" id="tab-name" placeholder="Enter a name…" />
  </div>

  <div class="section">
    <div class="section-label">Tab color</div>
    <div class="colors" id="color-picker"></div>
  </div>

  <div class="actions">
    <button class="btn-reset" id="btn-reset">Reset</button>
    <button class="btn-apply" id="btn-apply">Apply</button>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
